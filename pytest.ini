# pytest.ini - 測試配置
# 位置: /home/eric/workspace251204/pytest.ini

[tool:pytest]
minversion = 7.0

# 測試目錄
testpaths =
    tests
    automl-mcp-server/tests
    automl-service/tests
    stats-service/tests
    stats-worker/tests
norecursedirs =
    .git
    .venv
    htmlcov
    projects
    memory-bank
asyncio_mode = auto

# 輸出選項
addopts =
    -v                          # verbose
    --tb=short                  # 簡短 traceback
    --strict-markers            # 強制使用已註冊的 markers
    --disable-warnings          # 禁用警告
    -ra                         # 顯示所有測試結果摘要
    --color=yes                 # 彩色輸出

# 自訂 markers（測試分類）
markers =
    # 測試類型
    unit: Unit tests (isolated, fast)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (complete user workflows)

    # 優先級
    slow: Slow tests (> 10s)
    fast: Fast tests (< 1s)

    # 功能領域
    data_analysis: Data analysis and statistics tests
    ml: Machine learning and AutoML tests
    survival: Survival analysis tests

    # 測試類別（對應 TESTING_ENHANCEMENT_PLAN.md）
    edge_case: Edge case and boundary tests
    performance: Performance and load tests
    security: Security and penetration tests
    benchmark: Benchmark tests

    # 基礎設施
    redis: Tests requiring Redis
    minio: Tests requiring MinIO
    docker: Tests requiring Docker services

# 日誌配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆蓋率配置
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.venv/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
