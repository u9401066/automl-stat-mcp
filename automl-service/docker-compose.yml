version: '3.8'

services:
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: automl-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # AutoML Service
  automl-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automl-service
    ports:
      - "8001:8001"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=automl-datasets
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - AUTOGLUON_PRESETS=medium_quality
      - DEFAULT_TIME_LIMIT=300
    volumes:
      - automl_data:/app/data
      - automl_models:/app/models
      - automl_jobs:/app/jobs
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data:
  automl_data:
  automl_models:
  automl_jobs:
