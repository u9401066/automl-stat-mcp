# =============================================================================
# Nginx Reverse Proxy for AutoML Service
# =============================================================================
# Features:
#   - HTTPS termination (TLS 1.2/1.3)
#   - Convert external GET requests to internal POST
#   - Security headers
#   - Rate limiting
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream automl_api {
    server automl-api:8001;
    keepalive 32;
}

upstream automl_mcp {
    server automl-mcp:8002;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ==========================================================================
    # SSL Configuration
    # ==========================================================================
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    
    # Modern SSL settings (TLS 1.2 and 1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ==========================================================================
    # Security Headers
    # ==========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    # ==========================================================================
    # Rate Limiting
    # ==========================================================================
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # ==========================================================================
    # AutoML API - POST-only Gateway
    # ==========================================================================
    
    # Health check - allow GET (internal monitoring)
    location = /api/health {
        proxy_pass http://automl_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # POST-only API endpoints
    location /api/ {
        # Only allow POST method
        limit_except POST {
            deny all;
        }

        # Rewrite /api/* to /*
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://automl_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";
        
        # Timeout settings for long-running training jobs
        proxy_read_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ==========================================================================
    # MCP Server - Streamable HTTP (POST-based, enterprise compliant)
    # ==========================================================================
    location /mcp/ {
        # Streamable-HTTP uses POST for all communication
        limit_except POST {
            deny all;
        }

        rewrite ^/mcp/(.*)$ /$1 break;
        
        proxy_pass http://automl_mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Streaming settings for long-running requests
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ==========================================================================
    # Deny all other requests
    # ==========================================================================
    location / {
        return 404 '{"error": "Not Found"}';
        add_header Content-Type application/json;
    }
}
