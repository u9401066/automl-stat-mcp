name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允許手動觸發

env:
  PYTHON_VERSION: "3.10"

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Quality Gate

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run unit and smoke tests
        run: uv run pytest tests/unit/test_redis_manager.py tests/test_tool_logic.py -v --tb=short

  integration-smoke:
    runs-on: ubuntu-latest
    name: Integration Smoke Tests
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Start services
        run: docker compose up -d --build redis stats-service stats-worker automl-mcp

      - name: Wait for health checks
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8003/health >/dev/null && curl -fsS http://localhost:8002/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Services did not become healthy in time"
          exit 1

      - name: Run integration smoke tests
        run: uv run pytest tests/test_service_communication.py tests/test_dataflow_integrity.py -v --tb=short -x
        env:
          STATS_API_URL: http://localhost:8003

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down -v
