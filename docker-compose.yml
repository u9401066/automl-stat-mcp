# =============================================================================
# Clinical AutoML MCP - Open Source Data Analysis & ML Platform
# =============================================================================
#
# 🚀 Quick Start (Local Mode - No External Dependencies):
#   docker compose up -d                    # Stats + MCP only
#
# 📊 Profiles:
#   docker compose --profile stats up -d    # Statistics only
#   docker compose --profile ml up -d       # + ML training
#   docker compose --profile full up -d     # + MinIO storage
#
# 🔧 Components:
#   - automl-mcp: MCP Server for AI agents (always on)
#   - stats-service: Statistical analysis API
#   - stats-worker: Background analysis workers
#   - automl-api: ML training API (profile: ml)
#   - automl-worker: AutoGluon workers (profile: ml)
#   - minio: Object storage (profile: full, optional)
#
# 💾 Storage Modes:
#   STORAGE_MODE=local  (default) - Uses local /data directory
#   STORAGE_MODE=minio  - Uses MinIO (requires 'full' profile or external MinIO)
#
# 📈 Scaling Workers:
#   docker compose --profile ml up -d --scale automl-worker=8 --scale stats-worker=4
#
# 🔗 External MinIO (no local minio container):
#   1. Set MINIO_ENDPOINT, MINIO_ACCESS_KEY, MINIO_SECRET_KEY in .env
#   2. Set STORAGE_MODE=minio
#   3. docker compose --profile ml up -d
#
# =============================================================================

services:
  # ===========================================================================
  # Redis - Job Queue & Status Store (Always Required)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: automl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - automl-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # AutoML MCP Server (Always On - Core Component)
  # ===========================================================================
  automl-mcp:
    build: ./automl-mcp-server
    container_name: automl-mcp
    ports:
      - "8002:8002"
    environment:
      - AUTOML_SERVICE_URL=http://automl-api:8001
      - STATS_SERVICE_URL=http://stats-service:8003
      - MCP_MODE=sse
      - MCP_PORT=8002
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_DATA_ROOT=/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./sample_data:/data/sample_data:ro
      - ./projects:/data/projects
      - local-results:/data/results
    networks:
      - automl-network
    depends_on:
      - stats-service
    restart: unless-stopped

  # ===========================================================================
  # Stats Service - Statistical Analysis API (Always On)
  # ===========================================================================
  stats-service:
    build:
      context: .
      dockerfile: stats-service/Dockerfile
    container_name: stats-service
    ports:
      - "8003:8003"
    environment:
      # Storage Mode
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_DATA_ROOT=/data
      # MinIO (only used if STORAGE_MODE=minio)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_REPORTS_BUCKET=${MINIO_REPORTS_BUCKET:-stats-reports}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Service
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8003
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./sample_data:/data/sample_data:ro
      - ./projects:/data/projects
      - local-results:/data/results
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # Stats Worker - Statistical Analysis Background Worker (Always On)
  # ===========================================================================
  stats-worker:
    build: ./stats-worker
    environment:
      # Storage Mode
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_DATA_ROOT=/data
      # MinIO (only used if STORAGE_MODE=minio)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_REPORTS_BUCKET=${MINIO_REPORTS_BUCKET:-stats-reports}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker
      - TEMP_DIR=/tmp/stats-work
      - REDIS_JOB_TTL=86400
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./sample_data:/data/sample_data:ro
      - ./projects:/data/projects
      - local-results:/data/results
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ===========================================================================
  # AutoML API Service (Profile: ml)
  # ===========================================================================
  automl-api:
    build: ./automl-service
    container_name: automl-api
    profiles:
      - ml
      - full
    ports:
      - "8001:8001"
    environment:
      # Storage Mode
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_DATA_ROOT=/data
      # MinIO (only used if STORAGE_MODE=minio)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./sample_data:/data/sample_data:ro
      - ./projects:/data/projects
      - local-results:/data/results
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # AutoGluon Worker (Profile: ml)
  # ===========================================================================
  automl-worker:
    build: ./automl-worker
    profiles:
      - ml
      - full
    environment:
      # Storage Mode
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_DATA_ROOT=/data
      # MinIO (only used if STORAGE_MODE=minio)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker settings
      - WORKER_TEMP_DIR=/tmp/autogluon-work
      - WORKER_TYPE=cpu
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./sample_data:/data/sample_data:ro
      - ./projects:/data/projects
      - local-results:/data/results
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ===========================================================================
  # MinIO - Object Storage (Profile: full - Optional)
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: automl-minio
    profiles:
      - full
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - automl-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  local-results:
  minio-data:

networks:
  automl-network:
    driver: bridge
