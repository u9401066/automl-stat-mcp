# =============================================================================
# AutoML Full Stack - Separated Architecture
# =============================================================================
#
# Components:
#   - automl-api: FastAPI service (lightweight, no AutoGluon)
#   - automl-worker: AutoGluon training workers (default: 4 replicas)
#   - automl-mcp: MCP Server for AI agents
#   - stats-service: Statistical analysis API (EDA, TableOne)
#   - stats-worker: Statistical analysis workers
#   - redis: Job queue and status storage
#
# External (connect only, no local data storage):
#   - MinIO: Your existing MinIO server
#
# Usage:
#   1. Copy .env.example to .env and configure MinIO connection
#   2. docker compose up -d   # Starts all services with 4 workers
#
# Scaling Workers:
#   docker compose up -d --scale automl-worker=8 --scale stats-worker=2
#
# GPU Support:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# =============================================================================

services:
  # ===========================================================================
  # Redis - Job Queue & Status Store
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: automl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - automl-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # AutoML API Service (Lightweight - No AutoGluon)
  # ===========================================================================
  automl-api:
    build: ./automl-service
    container_name: automl-api
    ports:
      - "8001:8001"
    environment:
      # MinIO - Connect to your existing server (no local storage)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio.example.com:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Logging
      - LOG_LEVEL=INFO
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # AutoGluon Worker (Official Image - Zero Maintenance)
  # ===========================================================================
  # To update AutoGluon: Change the FROM tag in automl-worker/Dockerfile
  # Available tags: https://hub.docker.com/r/autogluon/autogluon/tags
  #
  # GPU support: Use docker-compose.gpu.yml
  # Scaling: docker-compose up -d --scale automl-worker=3
  # ===========================================================================
  automl-worker:
    build: ./automl-worker
    # Note: container_name removed to support scaling
    environment:
      # MinIO - Same as API
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio.example.com:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker settings
      - WORKER_TEMP_DIR=/tmp/autogluon-work
      - WORKER_TYPE=cpu
      - LOG_LEVEL=INFO
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 4  # Default 4 workers for parallel training
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ===========================================================================
  # AutoML MCP Server
  # ===========================================================================
  automl-mcp:
    build: ./automl-mcp-server
    container_name: automl-mcp
    ports:
      - "8002:8002"
    environment:
      - AUTOML_SERVICE_URL=http://automl-api:8001
      - STATS_SERVICE_URL=http://stats-service:8003
      - MCP_MODE=sse
      - MCP_PORT=8002
      - LOG_LEVEL=INFO
    volumes:
      # Data directories for file upload (MCP reads files directly)
      # This avoids Copilot handling file content (saves tokens, no truncation)
      - ./sample_data:/data/sample_data:ro    # Sample datasets (read-only)
      - ./uploads:/data/uploads:ro            # User uploaded files (read-only)
      - ./datasets:/data/datasets:ro          # Additional datasets (read-only)
      - ./processed:/data/processed           # Processed files with sanitized columns (read-write)
      - ./results:/data/results               # Analysis results for user access (read-write)
    networks:
      - automl-network
    depends_on:
      - automl-api
      - stats-service
    restart: unless-stopped

  # ===========================================================================
  # Stats Service - Statistical Analysis API
  # ===========================================================================
  # Provides EDA reports and Table 1 generation
  # ===========================================================================
  stats-service:
    build: ./stats-service
    container_name: stats-service
    ports:
      - "8003:8003"
    environment:
      # AutoML Service - For dataset lookup
      - AUTOML_SERVICE_URL=http://automl-api:8001
      # MinIO - Same as AutoML
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio.example.com:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_REPORTS_BUCKET=${MINIO_REPORTS_BUCKET:-stats-reports}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Service
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8003
      - LOG_LEVEL=INFO
    volumes:
      # Data directories for data cleaning operations
      - ./sample_data:/data/sample_data:ro    # Sample datasets (read-only)
      - ./uploads:/data/uploads:ro            # User uploaded files (read-only)
      - ./datasets:/data/datasets:ro          # Additional datasets (read-only)
      - ./processed:/data/processed           # Processed/cleaned files (read-write)
      - ./results:/data/results               # Analysis results for user access (read-write)
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
      automl-api:
        condition: service_started
    restart: unless-stopped

  # ===========================================================================
  # Stats Worker - Statistical Analysis Background Worker
  # ===========================================================================
  # Processes EDA and TableOne jobs using ydata-profiling and tableone
  # Scaling: docker-compose up -d --scale stats-worker=2
  # ===========================================================================
  stats-worker:
    build: ./stats-worker
    # Note: container_name removed to support scaling
    environment:
      # MinIO - Same as API
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio.example.com:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_REPORTS_BUCKET=${MINIO_REPORTS_BUCKET:-stats-reports}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker
      - TEMP_DIR=/tmp/stats-work
      - RESULTS_BASE_PATH=/data/results
      - LOG_LEVEL=INFO
    volumes:
      # Data and results directories
      - ./sample_data:/data/sample_data:ro    # Sample datasets (read-only)
      - ./datasets:/data/datasets:ro          # Additional datasets (read-only)
      - ./processed:/data/processed           # Processed files (read-write)
      - ./results:/data/results               # Analysis results for user access (read-write)
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2  # Default 2 stats workers
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  redis-data:

networks:
  automl-network:
    driver: bridge
