# =============================================================================
# Docker Compose - Scaling Configuration
# =============================================================================
#
# Use with:
#   docker-compose -f docker-compose.yml -f docker-compose.scale.yml up -d
#
# This file configures:
#   - Multiple CPU workers
#   - Load balancing settings
#   - Resource limits per worker
#
# =============================================================================

services:
  # ===========================================================================
  # Scaled CPU Workers
  # ===========================================================================
  automl-worker:
    # Remove container_name to allow scaling
    # container_name: automl-worker
    deploy:
      mode: replicated
      replicas: 3  # Number of workers
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
