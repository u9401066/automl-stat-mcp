# =============================================================================
# AutoML Stack - Enterprise HTTPS Deployment
# =============================================================================
#
# Security features:
#   - HTTPS only (TLS 1.2/1.3)
#   - POST-only API (no GET allowed externally)
#   - Rate limiting
#   - Security headers
#
# Setup:
#   1. Copy .env.example to .env and configure
#   2. Place SSL certificates in ./nginx/ssl/
#   3. docker-compose -f docker-compose.https.yml up -d
#
# Endpoints (external):
#   - https://your-domain/api/*     - AutoML API (POST only)
#   - https://your-domain/api/health - Health check (GET allowed)
#   - https://your-domain/mcp/*     - MCP Server (POST only)
#
# =============================================================================

services:
  # ===========================================================================
  # Nginx - HTTPS Reverse Proxy (Entry Point)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: automl-nginx
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./nginx/ssl}/server.crt:/etc/nginx/ssl/server.crt:ro
      - ${SSL_KEY_PATH:-./nginx/ssl}/server.key:/etc/nginx/ssl/server.key:ro
    networks:
      - automl-network
    depends_on:
      - automl-api
      - automl-mcp
    restart: unless-stopped

  # ===========================================================================
  # Redis - Job Queue & Status Store (Internal Only)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: automl-redis
    # No external ports exposed - internal only
    volumes:
      - redis-data:/data
    networks:
      - automl-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # AutoML API Service (Internal Only)
  # ===========================================================================
  automl-api:
    build: ./automl-service
    container_name: automl-api
    # No external ports - accessed via Nginx only
    expose:
      - "8001"
    environment:
      # MinIO
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?Please set MINIO_ENDPOINT in .env}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?Please set MINIO_ACCESS_KEY in .env}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?Please set MINIO_SECRET_KEY in .env}
      - MINIO_SECURE=${MINIO_SECURE:-true}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # AutoML Worker (Internal Only)
  # ===========================================================================
  automl-worker:
    build: ./automl-worker
    # No external ports - internal only
    environment:
      # MinIO
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?Please set MINIO_ENDPOINT in .env}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?Please set MINIO_ACCESS_KEY in .env}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?Please set MINIO_SECRET_KEY in .env}
      - MINIO_SECURE=${MINIO_SECURE:-true}
      - MINIO_DATASET_BUCKET=${MINIO_DATASET_BUCKET:-automl-datasets}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-automl-models}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker settings
      - WORKER_TEMP_DIR=/tmp/autogluon-work
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - automl-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-4}
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ===========================================================================
  # AutoML MCP Server (Internal Only)
  # ===========================================================================
  automl-mcp:
    build: ./automl-mcp-server
    container_name: automl-mcp
    # No external ports - accessed via Nginx only
    expose:
      - "8002"
    environment:
      - AUTOML_SERVICE_URL=http://automl-api:8001
      - MCP_MODE=sse
      - MCP_PORT=8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - automl-network
    depends_on:
      - automl-api
    restart: unless-stopped

volumes:
  redis-data:

networks:
  automl-network:
    driver: bridge
    internal: false
