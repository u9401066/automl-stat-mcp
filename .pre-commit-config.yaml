repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
      - id: mypy-workspace
        name: mypy-workspace
        entry: bash scripts/run_mypy_checks.sh
        language: system
        pass_filenames: false
      - id: uv-lock-check
        name: uv-lock-check
        entry: uv lock --check
        language: system
        pass_filenames: false